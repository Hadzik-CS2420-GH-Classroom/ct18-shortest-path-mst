<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 900" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">prims_mst() &#x2014; Min-Heap MST Growth</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">One code block per conceptual step &#x2014; grow the MST one edge at a time</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- ===== SETUP SECTION LABEL ===== -->
  <text x="30" y="92" font-size="10" fill="#2980b9" font-weight="bold" font-style="italic">Setup: start vertex, min-heap, seed frontier</text>

  <!-- Row backgrounds (setup) -->
  <rect x="20" y="98" width="820" height="48" fill="#f9f9f9"/>
  <rect x="20" y="146" width="820" height="54" fill="white"/>
  <rect x="20" y="200" width="820" height="96" fill="#f9f9f9"/>
  <rect x="20" y="296" width="820" height="64" fill="white"/>
  <rect x="20" y="360" width="820" height="48" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Init MST set ===== -->
  <rect x="30" y="106" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="126" fill="#9cdcfe">in_mst</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">insert</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">start</tspan><tspan fill="#ddd">);</tspan>
  </text>
  <line x1="410" y1="121" x2="458" y2="121" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,117 466,121 458,125" fill="#bdc3c7"/>
  <text x="476" y="118" font-size="11" fill="#555"><tspan font-weight="bold">Start the MST with one vertex.</tspan> Any starting</text>
  <text x="476" y="134" font-size="11" fill="#555">vertex gives the same total weight in the end.</text>

  <!-- ===== ROW 2: using EdgeTuple alias ===== -->
  <rect x="30" y="154" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="174" fill="#569cd6">using</tspan><tspan fill="#ddd"> </tspan><tspan fill="#4ec9b0">EdgeTuple</tspan><tspan fill="#ddd"> = std::</tspan><tspan fill="#4ec9b0">tuple</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">, std::</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">, std::</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt;;</tspan>
  </text>
  <line x1="410" y1="169" x2="458" y2="169" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,165 466,169 458,173" fill="#bdc3c7"/>
  <text x="476" y="162" font-size="11" fill="#555"><tspan font-weight="bold">Type alias.</tspan> Three fields &#x2014; (weight, from, to).</text>
  <text x="476" y="178" font-size="11" fill="#555">We need <tspan font-family="Consolas, monospace" font-size="10">from</tspan> to record the MST edge in output.</text>
  <text x="476" y="194" font-size="11" fill="#555">Naming it <tspan font-family="Consolas, monospace" font-size="10">EdgeTuple</tspan> keeps the next line readable.</text>

  <!-- ===== ROW 3: min-heap declaration ===== -->
  <rect x="30" y="208" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="228" fill="#ddd">std::</tspan><tspan fill="#4ec9b0">priority_queue</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">EdgeTuple</tspan><tspan fill="#ddd">, std::</tspan><tspan fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">EdgeTuple</tspan><tspan fill="#ddd">&gt;, std::</tspan><tspan fill="#4ec9b0">greater</tspan><tspan fill="#ddd">&lt;&gt;&gt; </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="223" x2="458" y2="223" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,219 466,223 458,227" fill="#bdc3c7"/>
  <text x="476" y="216" font-size="11" fill="#27ae60" font-weight="bold">Build a min-heap of (weight, from, to) tuples.</text>
  <text x="476" y="232" font-size="11" fill="#555">Same three template args as Dijkstra:</text>
  <text x="476" y="248" font-size="11" fill="#555">&#x2022; element type (<tspan font-family="Consolas, monospace" font-size="10">EdgeTuple</tspan>)</text>
  <text x="476" y="264" font-size="11" fill="#555">&#x2022; underlying container (<tspan font-family="Consolas, monospace" font-size="10">vector&lt;EdgeTuple&gt;</tspan>)</text>
  <text x="476" y="280" font-size="11" fill="#555">&#x2022; <tspan font-family="Consolas, monospace" font-size="10">greater&lt;&gt;</tspan> flips the default max-heap &#x2192; <tspan font-weight="bold">min-heap</tspan></text>
  <text x="476" y="294" font-size="11" fill="#555">Tuples compare lexicographically, so sorting is by <tspan font-family="Consolas, monospace" font-size="10">weight</tspan> first.</text>

  <!-- ===== ROW 4: Seed frontier ===== -->
  <rect x="30" y="304" width="380" height="48" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="320" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd"> : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">at</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">start</tspan><tspan fill="#ddd">)) {</tspan>
    <tspan x="60" y="336" fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">weight</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">start</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">});</tspan>
  </text>
  <line x1="410" y1="328" x2="458" y2="328" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,324 466,328 458,332" fill="#bdc3c7"/>
  <text x="476" y="316" font-size="11" fill="#555"><tspan font-weight="bold">Seed the frontier.</tspan> Every edge leaving</text>
  <text x="476" y="332" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">start</tspan> is a candidate crossing edge &#x2014; push</text>
  <text x="476" y="348" font-size="11" fill="#555">all of them into the heap at once.</text>

  <!-- ===== ROW 5: vertex_count ===== -->
  <rect x="30" y="368" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="388" fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">V</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#dcdcaa">vertex_count</tspan><tspan fill="#ddd">();</tspan>
  </text>
  <line x1="410" y1="383" x2="458" y2="383" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,379 466,383 458,387" fill="#bdc3c7"/>
  <text x="476" y="380" font-size="11" fill="#555"><tspan font-weight="bold">Cache V.</tspan> We'll stop once the MST set</text>
  <text x="476" y="396" font-size="11" fill="#555">contains all V vertices (V-1 accepted edges).</text>

  <!-- ===== MAIN LOOP SECTION LABEL ===== -->
  <text x="30" y="426" font-size="10" fill="#8e44ad" font-weight="bold" font-style="italic">Main loop: pop cheapest, skip cycles, accept and grow</text>

  <!-- Main-loop row backgrounds -->
  <rect x="20" y="432" width="820" height="58" fill="#f9f9f9"/>
  <rect x="20" y="490" width="820" height="48" fill="white"/>
  <rect x="20" y="538" width="820" height="56" fill="#f9f9f9"/>
  <rect x="20" y="594" width="820" height="64" fill="white"/>

  <!-- ===== ROW 6: while + pop ===== -->
  <rect x="30" y="440" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="456" fill="#c586c0">while</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">empty</tspan><tspan fill="#ddd">() &amp;&amp; </tspan><tspan fill="#9cdcfe">in_mst</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">size</tspan><tspan fill="#ddd">() &lt; </tspan><tspan fill="#9cdcfe">V</tspan><tspan fill="#ddd">) {</tspan>
    <tspan x="60" y="472" fill="#ddd">auto [</tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">from</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">top</tspan><tspan fill="#ddd">(); </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">pop</tspan><tspan fill="#ddd">();</tspan>
  </text>
  <line x1="410" y1="460" x2="458" y2="460" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,456 466,460 458,464" fill="#bdc3c7"/>
  <text x="476" y="450" font-size="11" fill="#27ae60" font-weight="bold">Pop the cheapest crossing edge.</text>
  <text x="476" y="466" font-size="11" fill="#555">Loop exits when we've added all V vertices or</text>
  <text x="476" y="482" font-size="11" fill="#555">run out of candidates.</text>

  <!-- ===== ROW 7: Cycle skip ===== -->
  <rect x="30" y="498" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="518" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">in_mst</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">count</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">)) </tspan><tspan fill="#c586c0">continue</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="513" x2="458" y2="513" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,509 466,513 458,517" fill="#bdc3c7"/>
  <text x="476" y="510" font-size="11" fill="#c0392b" font-weight="bold">Cycle skip.</text>
  <text x="476" y="526" font-size="11" fill="#555">If <tspan font-family="Consolas, monospace" font-size="10">to</tspan> is already in the MST, this edge would close a cycle &#x2014; discard.</text>

  <!-- ===== ROW 8: Record accepted edge ===== -->
  <rect x="30" y="546" width="380" height="48" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="562" fill="#9cdcfe">mst_edges</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push_back</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">from</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">});</tspan>
    <tspan x="40" y="578" fill="#9cdcfe">total_weight</tspan><tspan fill="#ddd"> += </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="40" y="594" fill="#9cdcfe">in_mst</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">insert</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">);</tspan>
  </text>
  <line x1="410" y1="570" x2="458" y2="570" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,566 466,570 458,574" fill="#bdc3c7"/>
  <text x="476" y="556" font-size="11" fill="#27ae60" font-weight="bold">Accept the edge.</text>
  <text x="476" y="572" font-size="11" fill="#555">&#x2022; record it in the output vector</text>
  <text x="476" y="588" font-size="11" fill="#555">&#x2022; bump the running total</text>
  <text x="476" y="604" font-size="11" fill="#555">&#x2022; mark <tspan font-family="Consolas, monospace" font-size="10">to</tspan> as now in the MST</text>

  <!-- ===== ROW 9: Grow frontier ===== -->
  <rect x="30" y="602" width="380" height="48" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="618" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd"> : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">at</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">)) {</tspan>
    <tspan x="60" y="634" fill="#c586c0">if</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#9cdcfe">in_mst</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">count</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">))</tspan>
    <tspan x="80" y="650" fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">weight</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">});</tspan>
  </text>
  <line x1="410" y1="634" x2="458" y2="634" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,630 466,634 458,638" fill="#bdc3c7"/>
  <text x="476" y="616" font-size="11" fill="#2c3e50" font-weight="bold">Grow the frontier.</text>
  <text x="476" y="632" font-size="11" fill="#555">Every edge from <tspan font-family="Consolas, monospace" font-size="10">to</tspan> to a non-MST vertex</text>
  <text x="476" y="648" font-size="11" fill="#555">becomes a new candidate crossing edge.</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="670" width="800" height="220" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="430" y="694" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Why Prim's Builds a Minimum Spanning Tree</text>
  <text x="430" y="714" text-anchor="middle" fill="#555" font-size="12">At every step, the heap's top is the cheapest edge crossing from the MST set to the outside.</text>
  <text x="430" y="732" text-anchor="middle" fill="#555" font-size="12">The <tspan font-style="italic">cut property</tspan> says: that edge is always safe to include in some MST.</text>

  <text x="430" y="762" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Differences from Dijkstra</text>
  <text x="430" y="780" text-anchor="middle" fill="#555" font-size="11">&#x2022; Tuple has <tspan font-weight="bold">3</tspan> fields (w, from, to) &#x2014; we need <tspan font-family="Consolas, monospace">from</tspan> to record the MST edge.</text>
  <text x="430" y="796" text-anchor="middle" fill="#555" font-size="11">&#x2022; Skip rule is "is <tspan font-family="Consolas, monospace">to</tspan> already in the set?" instead of "is this distance stale?"</text>
  <text x="430" y="812" text-anchor="middle" fill="#555" font-size="11">&#x2022; Stop after V&#x2212;1 edges; Dijkstra drains the whole heap.</text>

  <text x="430" y="840" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Cycle skip vs push-time filter</text>
  <text x="430" y="858" text-anchor="middle" fill="#555" font-size="11">The row-9 push-time filter (<tspan font-family="Consolas, monospace">if (!in_mst.count(edge.to))</tspan>) catches most cycles up front.</text>
  <text x="430" y="874" text-anchor="middle" fill="#555" font-size="11">The row-7 pop-time skip handles the rest: an edge pushed earlier becomes a cycle later.</text>
</svg>
