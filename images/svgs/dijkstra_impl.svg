<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 900" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">dijkstra() &#x2014; Min-Heap Shortest Path Implementation</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">One code block per conceptual step &#x2014; walk the class through each in turn</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- ===== SETUP SECTION LABEL ===== -->
  <text x="30" y="92" font-size="10" fill="#2980b9" font-weight="bold" font-style="italic">Setup: initialize dist and the min-heap</text>

  <!-- Row backgrounds (setup) -->
  <rect x="20" y="98" width="820" height="48" fill="#f9f9f9"/>
  <rect x="20" y="146" width="820" height="56" fill="white"/>
  <rect x="20" y="202" width="820" height="48" fill="#f9f9f9"/>
  <rect x="20" y="250" width="820" height="48" fill="white"/>
  <rect x="20" y="298" width="820" height="54" fill="#f9f9f9"/>
  <rect x="20" y="352" width="820" height="96" fill="white"/>
  <rect x="20" y="448" width="820" height="48" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Declare dist ===== -->
  <rect x="30" y="106" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="126" fill="#4ec9b0">unordered_map</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="121" x2="458" y2="121" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,117 466,121 458,125" fill="#bdc3c7"/>
  <text x="476" y="118" font-size="11" fill="#555"><tspan font-weight="bold">Declare</tspan> the output map. Keys are vertex names,</text>
  <text x="476" y="134" font-size="11" fill="#555">values are best-known distances. Starts empty.</text>

  <!-- ===== ROW 2: Init loop ===== -->
  <rect x="30" y="154" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="170" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; [</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edges</tspan><tspan fill="#ddd">] : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">)</tspan>
    <tspan x="60" y="186" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">] = std::numeric_limits&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt;::max();</tspan>
  </text>
  <line x1="410" y1="174" x2="458" y2="174" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,170 466,174 458,178" fill="#bdc3c7"/>
  <text x="476" y="164" font-size="11" fill="#555"><tspan font-weight="bold">Initialize</tspan> every vertex's distance to</text>
  <text x="476" y="180" font-size="11" fill="#555">"infinity" &#x2014; the largest possible int.</text>
  <text x="476" y="196" font-size="11" fill="#555">Any real path will beat this baseline.</text>

  <!-- ===== ROW 3: Guard ===== -->
  <rect x="30" y="210" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="230" fill="#c586c0">if</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#dcdcaa">has_vertex</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">)) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="225" x2="458" y2="225" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,221 466,225 458,229" fill="#bdc3c7"/>
  <text x="476" y="222" font-size="11" fill="#c0392b" font-weight="bold">Guard clause.</text>
  <text x="476" y="238" font-size="11" fill="#555">If the caller's source isn't in the graph, bail out with all-&#x221E; dist.</text>

  <!-- ===== ROW 4: Seed source ===== -->
  <rect x="30" y="258" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="278" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="273" x2="458" y2="273" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,269 466,273 458,277" fill="#bdc3c7"/>
  <text x="476" y="270" font-size="11" fill="#555"><tspan font-weight="bold">Seed the source.</tspan> The source is distance 0</text>
  <text x="476" y="286" font-size="11" fill="#555">from itself. This "seed" kicks off the algorithm.</text>

  <!-- ===== ROW 5: using Pair alias ===== -->
  <rect x="30" y="306" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="326" fill="#569cd6">using</tspan><tspan fill="#ddd"> </tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd"> = std::</tspan><tspan fill="#4ec9b0">pair</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">, std::</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt;;</tspan>
  </text>
  <line x1="410" y1="321" x2="458" y2="321" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,317 466,321 458,325" fill="#bdc3c7"/>
  <text x="476" y="314" font-size="11" fill="#555"><tspan font-weight="bold">Type alias.</tspan> The full <tspan font-family="Consolas, monospace" font-size="10">pair&lt;int, string&gt;</tspan> type</text>
  <text x="476" y="330" font-size="11" fill="#555">appears <tspan font-weight="bold">three times</tspan> on the next line &#x2014; naming</text>
  <text x="476" y="346" font-size="11" fill="#555">it <tspan font-family="Consolas, monospace" font-size="10">Pair</tspan> keeps the declaration readable.</text>

  <!-- ===== ROW 6: min-heap declaration ===== -->
  <rect x="30" y="360" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="380" fill="#ddd">std::</tspan><tspan fill="#4ec9b0">priority_queue</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd">, std::</tspan><tspan fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd">&gt;, std::</tspan><tspan fill="#4ec9b0">greater</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd">&gt;&gt; </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="375" x2="458" y2="375" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,371 466,375 458,379" fill="#bdc3c7"/>
  <text x="476" y="368" font-size="11" fill="#27ae60" font-weight="bold">Build a min-heap of (distance, vertex) pairs.</text>
  <text x="476" y="384" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">std::priority_queue</tspan> has <tspan font-weight="bold">three</tspan> template args:</text>
  <text x="476" y="400" font-size="11" fill="#555">&#x2022; element type (<tspan font-family="Consolas, monospace" font-size="10">Pair</tspan>)</text>
  <text x="476" y="416" font-size="11" fill="#555">&#x2022; underlying container (<tspan font-family="Consolas, monospace" font-size="10">vector&lt;Pair&gt;</tspan>)</text>
  <text x="476" y="432" font-size="11" fill="#555">&#x2022; comparator &#x2014; <tspan font-weight="bold" fill="#c0392b">this is the trick!</tspan></text>
  <text x="476" y="448" font-size="11" fill="#555">Default is <tspan font-family="Consolas, monospace" font-size="10">less&lt;&gt;</tspan> = <tspan font-weight="bold">max-heap</tspan>. We pass <tspan font-family="Consolas, monospace" font-size="10">greater&lt;&gt;</tspan> to flip it &#x2192; <tspan font-weight="bold">min-heap</tspan>.</text>

  <!-- ===== ROW 7: Seed min-heap ===== -->
  <rect x="30" y="456" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="476" fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">});</tspan>
  </text>
  <line x1="410" y1="471" x2="458" y2="471" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,467 466,471 458,475" fill="#bdc3c7"/>
  <text x="476" y="468" font-size="11" fill="#555"><tspan font-weight="bold">Seed the min-heap.</tspan> Push the source at distance 0.</text>
  <text x="476" y="484" font-size="11" fill="#555">First &#x2014; and only &#x2014; thing in the heap before the main loop.</text>

  <!-- ===== MAIN LOOP SECTION LABEL ===== -->
  <text x="30" y="514" font-size="10" fill="#8e44ad" font-weight="bold" font-style="italic">Main loop: extract closest, skip stale, relax neighbors</text>

  <!-- Main-loop row backgrounds -->
  <rect x="20" y="520" width="820" height="58" fill="#f9f9f9"/>
  <rect x="20" y="578" width="820" height="48" fill="white"/>
  <rect x="20" y="626" width="820" height="110" fill="#f9f9f9"/>

  <!-- ===== ROW 8: while + pop ===== -->
  <rect x="30" y="528" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="544" fill="#c586c0">while</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">empty</tspan><tspan fill="#ddd">()) {</tspan>
    <tspan x="60" y="560" fill="#ddd">auto [</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">top</tspan><tspan fill="#ddd">(); </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">pop</tspan><tspan fill="#ddd">();</tspan>
  </text>
  <line x1="410" y1="548" x2="458" y2="548" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,544 466,548 458,552" fill="#bdc3c7"/>
  <text x="476" y="538" font-size="11" fill="#27ae60" font-weight="bold">Pop the smallest-distance pair.</text>
  <text x="476" y="554" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">u</tspan> is the next vertex to finalize;</text>
  <text x="476" y="570" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">d</tspan> is the distance recorded at push time.</text>

  <!-- ===== ROW 9: Stale skip ===== -->
  <rect x="30" y="586" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="606" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd"> &gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">]) </tspan><tspan fill="#c586c0">continue</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="601" x2="458" y2="601" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,597 466,601 458,605" fill="#bdc3c7"/>
  <text x="476" y="598" font-size="11" fill="#c0392b" font-weight="bold">Stale-entry skip.</text>
  <text x="476" y="614" font-size="11" fill="#555">If <tspan font-family="Consolas, monospace" font-size="10">d</tspan> is worse than what we already know, this pair is out of date (see 2a).</text>

  <!-- ===== ROW 10: Relaxation loop ===== -->
  <rect x="30" y="634" width="380" height="92" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="650" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd"> : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">at</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">)) {</tspan>
    <tspan x="60" y="666" fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] + </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">weight</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="60" y="682" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd"> &lt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">]) {</tspan>
    <tspan x="80" y="698" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="80" y="714" fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">});</tspan>
  </text>
  <line x1="410" y1="680" x2="458" y2="680" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,676 466,680 458,684" fill="#bdc3c7"/>
  <text x="476" y="650" font-size="11" fill="#27ae60" font-weight="bold">Relaxation.</text>
  <text x="476" y="666" font-size="11" fill="#555">For every outgoing edge from <tspan font-family="Consolas, monospace" font-size="10">u</tspan>:</text>
  <text x="476" y="682" font-size="11" fill="#555">&#x2022; compute the candidate path length</text>
  <text x="476" y="698" font-size="11" fill="#555">&#x2022; if shorter than what we had, <tspan font-weight="bold">update</tspan></text>
  <text x="476" y="714" font-size="11" fill="#555">&#x2022; push the new pair so it's considered later</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="746" width="800" height="142" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="430" y="768" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Why Dijkstra's Is Correct</text>
  <text x="430" y="788" text-anchor="middle" fill="#555" font-size="12">The min-heap always hands us the unfinalized vertex with the smallest known distance.</text>
  <text x="430" y="806" text-anchor="middle" fill="#555" font-size="12">With non-negative weights, no later path can ever be cheaper &#x2014; so we can "finalize" it on pop.</text>

  <text x="430" y="832" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Key invariant</text>
  <text x="430" y="850" text-anchor="middle" fill="#555" font-size="11">When a vertex is popped with <tspan font-family="Consolas, monospace">d == dist[u]</tspan>, that distance is final.</text>
  <text x="430" y="866" text-anchor="middle" fill="#555" font-size="11">Stale entries (where <tspan font-family="Consolas, monospace">d &gt; dist[u]</tspan>) are leftovers from earlier, worse paths we've since beaten.</text>
  <text x="430" y="884" text-anchor="middle" fill="#888" font-size="10">Complexity: O((V + E) log V) &#x2014; every edge can cause at most one heap push.</text>
</svg>
