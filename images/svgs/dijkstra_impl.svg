<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 820" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">dijkstra() &#x2014; Min-Heap Shortest Path Implementation</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">One code block per conceptual step &#x2014; walk the class through each in turn</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- ===== SETUP SECTION LABEL ===== -->
  <text x="30" y="92" font-size="10" fill="#2980b9" font-weight="bold" font-style="italic">Setup: initialize dist and the priority queue</text>

  <!-- Row backgrounds -->
  <rect x="20" y="98" width="820" height="48" fill="#f9f9f9"/>
  <rect x="20" y="146" width="820" height="56" fill="white"/>
  <rect x="20" y="202" width="820" height="48" fill="#f9f9f9"/>
  <rect x="20" y="250" width="820" height="48" fill="white"/>
  <rect x="20" y="298" width="820" height="64" fill="#f9f9f9"/>
  <rect x="20" y="362" width="820" height="48" fill="white"/>

  <!-- ===== ROW 1: Declare dist ===== -->
  <rect x="30" y="106" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="126" fill="#4ec9b0">unordered_map</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="121" x2="458" y2="121" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,117 466,121 458,125" fill="#bdc3c7"/>

  <text x="476" y="118" font-size="11" fill="#555"><tspan font-weight="bold">Declare</tspan> the output map. Keys are vertex names,</text>
  <text x="476" y="134" font-size="11" fill="#555">values are best-known distances. Starts empty.</text>

  <!-- ===== ROW 2: Init loop ===== -->
  <rect x="30" y="154" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="170" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; [</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edges</tspan><tspan fill="#ddd">] : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">)</tspan>
    <tspan x="60" y="186" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">] = std::numeric_limits&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt;::max();</tspan>
  </text>

  <line x1="410" y1="174" x2="458" y2="174" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,170 466,174 458,178" fill="#bdc3c7"/>

  <text x="476" y="164" font-size="11" fill="#555"><tspan font-weight="bold">Initialize</tspan> every vertex's distance to</text>
  <text x="476" y="180" font-size="11" fill="#555">"infinity" &#x2014; the largest possible int.</text>
  <text x="476" y="196" font-size="11" fill="#555">Any real path will beat this baseline.</text>

  <!-- ===== ROW 3: Guard ===== -->
  <rect x="30" y="210" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="230" fill="#c586c0">if</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#dcdcaa">has_vertex</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">)) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="225" x2="458" y2="225" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,221 466,225 458,229" fill="#bdc3c7"/>

  <text x="476" y="222" font-size="11" fill="#c0392b" font-weight="bold">Guard clause.</text>
  <text x="476" y="238" font-size="11" fill="#555">If the caller's source isn't in the graph, bail out with all-&#x221E; dist.</text>

  <!-- ===== ROW 4: Seed source ===== -->
  <rect x="30" y="258" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="278" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="273" x2="458" y2="273" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,269 466,273 458,277" fill="#bdc3c7"/>

  <text x="476" y="270" font-size="11" fill="#555"><tspan font-weight="bold">Seed the source.</tspan> The source is distance 0</text>
  <text x="476" y="286" font-size="11" fill="#555">from itself. This "seed" kicks off the algorithm.</text>

  <!-- ===== ROW 5: Min-heap declaration ===== -->
  <rect x="30" y="306" width="380" height="48" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="320" fill="#4ec9b0">priority_queue</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">pair</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">,</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt;,</tspan>
    <tspan x="60" y="334" fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">pair</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">,</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt;&gt;,</tspan>
    <tspan x="60" y="346" fill="#4ec9b0">greater</tspan><tspan fill="#ddd">&lt;&gt;&gt; </tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="328" x2="458" y2="328" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,324 466,328 458,332" fill="#bdc3c7"/>

  <text x="476" y="316" font-size="11" fill="#27ae60" font-weight="bold">Min-heap</text>
  <text x="476" y="316" font-size="11" fill="#555" dx="55"> of {distance, vertex} pairs.</text>
  <text x="476" y="332" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">greater&lt;&gt;</tspan> inverts the default max-heap so</text>
  <text x="476" y="348" font-size="11" fill="#555">the smallest distance is always on top.</text>

  <!-- ===== ROW 6: Seed heap ===== -->
  <rect x="30" y="370" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="390" fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">});</tspan>
  </text>

  <line x1="410" y1="385" x2="458" y2="385" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,381 466,385 458,389" fill="#bdc3c7"/>

  <text x="476" y="382" font-size="11" fill="#555"><tspan font-weight="bold">Seed the heap.</tspan> Push the source at distance 0.</text>
  <text x="476" y="398" font-size="11" fill="#555">This is the first &#x2014; and only &#x2014; thing in the heap before the main loop.</text>

  <!-- ===== MAIN LOOP SECTION LABEL ===== -->
  <text x="30" y="428" font-size="10" fill="#8e44ad" font-weight="bold" font-style="italic">Main loop: extract closest, skip stale, relax neighbors</text>

  <!-- Main-loop row backgrounds -->
  <rect x="20" y="434" width="820" height="58" fill="#f9f9f9"/>
  <rect x="20" y="492" width="820" height="48" fill="white"/>
  <rect x="20" y="540" width="820" height="110" fill="#f9f9f9"/>

  <!-- ===== ROW 7: while + pop ===== -->
  <rect x="30" y="442" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="458" fill="#c586c0">while</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">empty</tspan><tspan fill="#ddd">()) {</tspan>
    <tspan x="60" y="474" fill="#ddd">auto [</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">top</tspan><tspan fill="#ddd">(); </tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">pop</tspan><tspan fill="#ddd">();</tspan>
  </text>

  <line x1="410" y1="462" x2="458" y2="462" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,458 466,462 458,466" fill="#bdc3c7"/>

  <text x="476" y="452" font-size="11" fill="#27ae60" font-weight="bold">Pop the smallest-distance pair.</text>
  <text x="476" y="468" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">u</tspan> is the next vertex to finalize;</text>
  <text x="476" y="484" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">d</tspan> is the distance recorded at push time.</text>

  <!-- ===== ROW 8: Stale skip ===== -->
  <rect x="30" y="500" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="520" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd"> &gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">]) </tspan><tspan fill="#c586c0">continue</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="515" x2="458" y2="515" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,511 466,515 458,519" fill="#bdc3c7"/>

  <text x="476" y="512" font-size="11" fill="#c0392b" font-weight="bold">Stale-entry skip.</text>
  <text x="476" y="528" font-size="11" fill="#555">If <tspan font-family="Consolas, monospace" font-size="10">d</tspan> is worse than what we already know, this pair is out of date (see 2a).</text>

  <!-- ===== ROW 9: Relaxation loop ===== -->
  <rect x="30" y="548" width="380" height="92" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="564" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd"> : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">at</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">)) {</tspan>
    <tspan x="60" y="580" fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] + </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">weight</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="60" y="596" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd"> &lt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">]) {</tspan>
    <tspan x="80" y="612" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="80" y="628" fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">});</tspan>
  </text>

  <line x1="410" y1="593" x2="458" y2="593" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,589 466,593 458,597" fill="#bdc3c7"/>

  <text x="476" y="564" font-size="11" fill="#27ae60" font-weight="bold">Relaxation.</text>
  <text x="476" y="580" font-size="11" fill="#555">For every outgoing edge from <tspan font-family="Consolas, monospace" font-size="10">u</tspan>:</text>
  <text x="476" y="596" font-size="11" fill="#555">&#x2022; compute the candidate path length</text>
  <text x="476" y="612" font-size="11" fill="#555">&#x2022; if shorter than what we had, <tspan font-weight="bold">update</tspan></text>
  <text x="476" y="628" font-size="11" fill="#555">&#x2022; push the new pair so it's considered later</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="662" width="800" height="150" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="430" y="684" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Why Dijkstra's Is Correct</text>
  <text x="430" y="704" text-anchor="middle" fill="#555" font-size="12">The min-heap always hands us the unfinalized vertex with the smallest known distance.</text>
  <text x="430" y="722" text-anchor="middle" fill="#555" font-size="12">With non-negative weights, no later path can ever be cheaper &#x2014; so we can "finalize" it on pop.</text>

  <text x="430" y="750" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Key invariant</text>
  <text x="430" y="768" text-anchor="middle" fill="#555" font-size="11">When a vertex is popped with <tspan font-family="Consolas, monospace">d == dist[u]</tspan>, that distance is final.</text>
  <text x="430" y="784" text-anchor="middle" fill="#555" font-size="11">Stale entries (where <tspan font-family="Consolas, monospace">d &gt; dist[u]</tspan>) are the leftovers from earlier, worse paths we've since beaten.</text>
  <text x="430" y="802" text-anchor="middle" fill="#888" font-size="10">Complexity: O((V + E) log V) &#x2014; every edge can cause at most one heap push.</text>
</svg>
