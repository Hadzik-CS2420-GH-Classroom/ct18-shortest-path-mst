<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 634" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">dijkstra() &#x2014; Min-Heap Shortest Path Implementation</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">Greedy: always expand the unfinalized vertex with the smallest known distance</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- Row backgrounds -->
  <rect x="20" y="78" width="820" height="74" fill="#f9f9f9"/>
  <rect x="20" y="152" width="820" height="54" fill="white"/>
  <rect x="20" y="206" width="820" height="54" fill="#f9f9f9"/>
  <rect x="20" y="260" width="820" height="58" fill="white"/>
  <rect x="20" y="318" width="820" height="58" fill="#f9f9f9"/>
  <rect x="20" y="376" width="820" height="88" fill="white"/>

  <!-- ===== ROW 1: Declare + init dist ===== -->
  <rect x="30" y="86" width="380" height="60" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="100" fill="#4ec9b0">unordered_map</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="40" y="114" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; [</tspan><tspan fill="#9cdcfe">v</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">_</tspan><tspan fill="#ddd">] : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">)</tspan>
    <tspan x="60" y="128" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">v</tspan><tspan fill="#ddd">] = INT_MAX;</tspan>
    <tspan x="40" y="142" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="116" x2="458" y2="116" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,112 466,116 458,120" fill="#bdc3c7"/>

  <text x="476" y="104" font-size="11" fill="#555"><tspan font-weight="bold">Declare</tspan> the output map and <tspan font-weight="bold">initialize</tspan></text>
  <text x="476" y="120" font-size="11" fill="#555">distances. Every vertex starts "infinitely</text>
  <text x="476" y="136" font-size="11" fill="#555">far"; source starts at 0 because we're there.</text>

  <!-- ===== ROW 2: Min-heap declaration ===== -->
  <rect x="30" y="160" width="380" height="46" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="174" fill="#4ec9b0">priority_queue</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">pair</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">,</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt;,</tspan>
    <tspan x="60" y="188" fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">pair</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">,</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt;&gt;,</tspan>
    <tspan x="60" y="200" fill="#4ec9b0">greater</tspan><tspan fill="#ddd">&lt;&gt;&gt; </tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="180" x2="458" y2="180" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,176 466,180 458,184" fill="#bdc3c7"/>

  <text x="476" y="174" font-size="11" fill="#27ae60" font-weight="bold">Min-heap</text>
  <text x="476" y="174" font-size="11" fill="#555" dx="55"> of {distance, vertex} pairs.</text>
  <text x="476" y="190" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">greater&lt;&gt;</tspan> inverts the default max-heap so</text>
  <text x="476" y="206" font-size="11" fill="#555">the smallest distance is always on top.</text>

  <!-- ===== ROW 3: Seed ===== -->
  <rect x="30" y="214" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="232" fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">});</tspan>
  </text>

  <line x1="410" y1="227" x2="458" y2="227" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,223 466,227 458,231" fill="#bdc3c7"/>

  <text x="476" y="222" font-size="11" fill="#555"><tspan font-weight="bold">Seed:</tspan> push the source at distance 0.</text>
  <text x="476" y="238" font-size="11" fill="#555">This is the first &#x2014; and only &#x2014; thing in the heap</text>
  <text x="476" y="254" font-size="11" fill="#555">before the main loop starts.</text>

  <!-- ===== ROW 4: Main loop pop ===== -->
  <text x="30" y="274" font-size="10" fill="#555" font-style="italic">Main loop: extract the closest unfinalized vertex</text>

  <rect x="30" y="280" width="380" height="34" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="294" fill="#c586c0">while</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">empty</tspan><tspan fill="#ddd">()) {</tspan>
    <tspan x="60" y="308" fill="#ddd">auto [</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">top</tspan><tspan fill="#ddd">(); </tspan><tspan fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">pop</tspan><tspan fill="#ddd">();</tspan>
  </text>

  <line x1="410" y1="297" x2="458" y2="297" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,293 466,297 458,301" fill="#bdc3c7"/>

  <text x="476" y="290" font-size="11" fill="#27ae60" font-weight="bold">Pop the smallest-distance pair.</text>
  <text x="476" y="306" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">u</tspan> is the next vertex to finalize;</text>
  <text x="476" y="322" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">d</tspan> is the distance recorded at push time.</text>

  <!-- ===== ROW 5: Stale skip ===== -->
  <text x="30" y="334" font-size="10" fill="#555" font-style="italic">Skip stale heap entries (see diagram 2a)</text>

  <rect x="30" y="340" width="380" height="26" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="60" y="358" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd"> &gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">]) </tspan><tspan fill="#c586c0">continue</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="353" x2="458" y2="353" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,349 466,353 458,357" fill="#bdc3c7"/>

  <text x="476" y="348" font-size="11" fill="#c0392b" font-weight="bold">Stale-entry skip.</text>
  <text x="476" y="364" font-size="11" fill="#555">If <tspan font-family="Consolas, monospace" font-size="10">d</tspan> is worse than what we already know,</text>
  <text x="476" y="380" font-size="11" fill="#555">this entry is out of date &#x2014; skip it.</text>

  <!-- ===== ROW 6: Relax loop ===== -->
  <text x="30" y="394" font-size="10" fill="#555" font-style="italic">Relaxation: try every outgoing edge from u</text>

  <rect x="30" y="400" width="380" height="64" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="60" y="416" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; [</tspan><tspan fill="#9cdcfe">v</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">] : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">at</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">)) {</tspan>
    <tspan x="80" y="430" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] + </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd"> &lt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">v</tspan><tspan fill="#ddd">]) {</tspan>
    <tspan x="100" y="444" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">v</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] + </tspan><tspan fill="#9cdcfe">w</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="100" y="458" fill="#9cdcfe">pq</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">v</tspan><tspan fill="#ddd">], </tspan><tspan fill="#9cdcfe">v</tspan><tspan fill="#ddd">});</tspan>
  </text>

  <line x1="410" y1="429" x2="458" y2="429" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,425 466,429 458,433" fill="#bdc3c7"/>

  <text x="476" y="412" font-size="11" fill="#555">Destructure each outgoing edge into <tspan font-family="Consolas, monospace" font-size="10">v</tspan> (neighbor)</text>
  <text x="476" y="428" font-size="11" fill="#555">and <tspan font-family="Consolas, monospace" font-size="10">w</tspan> (edge weight).</text>
  <text x="476" y="444" font-size="11" fill="#27ae60" font-weight="bold">Relaxation:</text>
  <text x="476" y="444" font-size="11" fill="#555" dx="72"> if we can reach <tspan font-family="Consolas, monospace" font-size="10">v</tspan> more</text>
  <text x="476" y="460" font-size="11" fill="#555">cheaply via <tspan font-family="Consolas, monospace" font-size="10">u</tspan>, update and push the new pair.</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="476" width="800" height="150" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="430" y="498" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Why Dijkstra's Is Correct</text>
  <text x="430" y="518" text-anchor="middle" fill="#555" font-size="12">The min-heap always hands us the unfinalized vertex with the smallest known distance.</text>
  <text x="430" y="536" text-anchor="middle" fill="#555" font-size="12">With non-negative weights, no later path can ever be cheaper &#x2014; so we can "finalize" it on pop.</text>

  <text x="430" y="564" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Key invariant</text>
  <text x="430" y="582" text-anchor="middle" fill="#555" font-size="11">When a vertex is popped with <tspan font-family="Consolas, monospace">d == dist[u]</tspan>, that distance is final.</text>
  <text x="430" y="598" text-anchor="middle" fill="#555" font-size="11">Stale entries (where <tspan font-family="Consolas, monospace">d &gt; dist[u]</tspan>) are the leftovers from earlier, worse paths we've since beaten.</text>
  <text x="430" y="616" text-anchor="middle" fill="#888" font-size="10">Complexity: O((V + E) log V) &#x2014; every edge can cause at most one heap push.</text>
</svg>
