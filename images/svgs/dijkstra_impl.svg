<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 932" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">dijkstra() &#x2014; Min-Heap Shortest Path Implementation</text>
  <text x="430" y="48" text-anchor="middle" fill="#777" font-size="13">One code block per conceptual step &#x2014; walk the class through each in turn</text>

  <!-- Column headers -->
  <text x="210" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">CODE</text>
  <text x="650" y="72" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">WHAT HAPPENS</text>

  <!-- ===== SETUP SECTION LABEL ===== -->
  <text x="30" y="92" font-size="10" fill="#2980b9" font-weight="bold" font-style="italic">Setup: initialize dist and the min-heap</text>

  <!-- Row backgrounds (setup) -->
  <rect x="20" y="98" width="820" height="48" fill="#f9f9f9"/>
  <rect x="20" y="146" width="820" height="56" fill="white"/>
  <rect x="20" y="202" width="820" height="48" fill="#f9f9f9"/>
  <rect x="20" y="250" width="820" height="48" fill="white"/>
  <rect x="20" y="298" width="820" height="54" fill="#f9f9f9"/>
  <rect x="20" y="352" width="820" height="128" fill="white"/>
  <rect x="20" y="480" width="820" height="48" fill="#f9f9f9"/>

  <!-- ===== ROW 1: Declare dist ===== -->
  <rect x="30" y="106" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="126" fill="#4ec9b0">unordered_map</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">, </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="121" x2="458" y2="121" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,117 466,121 458,125" fill="#bdc3c7"/>
  <text x="476" y="118" font-size="11" fill="#555"><tspan font-weight="bold">Declare</tspan> the output map. Keys are vertex names,</text>
  <text x="476" y="134" font-size="11" fill="#555">values are best-known distances. Starts empty.</text>

  <!-- ===== ROW 2: Init loop ===== -->
  <rect x="30" y="154" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="170" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; [</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edges</tspan><tspan fill="#ddd">] : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">)</tspan>
    <tspan x="60" y="186" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">vertex</tspan><tspan fill="#ddd">] = std::numeric_limits&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">&gt;::max();</tspan>
  </text>
  <line x1="410" y1="174" x2="458" y2="174" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,170 466,174 458,178" fill="#bdc3c7"/>
  <text x="476" y="164" font-size="11" fill="#555"><tspan font-weight="bold">Initialize</tspan> every vertex's distance to</text>
  <text x="476" y="180" font-size="11" fill="#555">"infinity" &#x2014; the largest possible int.</text>
  <text x="476" y="196" font-size="11" fill="#555">Any real path will beat this baseline.</text>

  <!-- ===== ROW 3: Guard ===== -->
  <rect x="30" y="210" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="230" fill="#c586c0">if</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#dcdcaa">has_vertex</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">)) </tspan><tspan fill="#c586c0">return</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="225" x2="458" y2="225" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,221 466,225 458,229" fill="#bdc3c7"/>
  <text x="476" y="222" font-size="11" fill="#c0392b" font-weight="bold">Guard clause.</text>
  <text x="476" y="238" font-size="11" fill="#555">If the caller's source isn't in the graph, bail out with all-&#x221E; dist.</text>

  <!-- ===== ROW 4: Seed source ===== -->
  <rect x="30" y="258" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="278" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="273" x2="458" y2="273" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,269 466,273 458,277" fill="#bdc3c7"/>
  <text x="476" y="270" font-size="11" fill="#555"><tspan font-weight="bold">Seed the source.</tspan> The source is distance 0</text>
  <text x="476" y="286" font-size="11" fill="#555">from itself. This "seed" kicks off the algorithm.</text>

  <!-- ===== ROW 5: using Pair alias ===== -->
  <rect x="30" y="306" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="326" fill="#569cd6">using</tspan><tspan fill="#ddd"> </tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd"> = std::</tspan><tspan fill="#4ec9b0">pair</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd">, std::</tspan><tspan fill="#4ec9b0">string</tspan><tspan fill="#ddd">&gt;;</tspan>
  </text>
  <line x1="410" y1="321" x2="458" y2="321" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,317 466,321 458,325" fill="#bdc3c7"/>
  <text x="476" y="314" font-size="11" fill="#555"><tspan font-weight="bold">Type alias.</tspan> The full <tspan font-family="Consolas, monospace" font-size="10">pair&lt;int, string&gt;</tspan> type</text>
  <text x="476" y="330" font-size="11" fill="#555">appears <tspan font-weight="bold">three times</tspan> on the next line &#x2014; naming</text>
  <text x="476" y="346" font-size="11" fill="#555">it <tspan font-family="Consolas, monospace" font-size="10">Pair</tspan> keeps the declaration readable.</text>

  <!-- ===== ROW 6: min-heap declaration with template-signature explainer ===== -->
  <!-- Template signature explainer box (light) -->
  <rect x="30" y="360" width="380" height="78" rx="4" fill="#fff8e1" stroke="#f0c36d" stroke-width="1"/>
  <text x="220" y="375" text-anchor="middle" font-size="9" font-style="italic" fill="#8a6d3b">std::priority_queue's three template parameters:</text>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="393" fill="#2c3e50">std::priority_queue&lt;</tspan><tspan fill="#c0392b" font-weight="bold">T</tspan><tspan fill="#2c3e50">, </tspan><tspan fill="#c0392b" font-weight="bold">Container</tspan><tspan fill="#2c3e50">, </tspan><tspan fill="#c0392b" font-weight="bold">Compare</tspan><tspan fill="#2c3e50">&gt;</tspan>
  </text>
  <text font-family="'Segoe UI', Arial, sans-serif" font-size="9">
    <tspan x="44" y="408" fill="#555"><tspan fill="#c0392b" font-weight="bold">T</tspan> &#x2014; element type (what you're storing)</tspan>
    <tspan x="44" y="420" fill="#555"><tspan fill="#c0392b" font-weight="bold">Container</tspan> &#x2014; underlying storage (usually <tspan font-family="Consolas, monospace">std::vector&lt;T&gt;</tspan>)</tspan>
    <tspan x="44" y="432" fill="#555"><tspan fill="#c0392b" font-weight="bold">Compare</tspan> &#x2014; ordering: default <tspan font-family="Consolas, monospace">less&lt;&gt;</tspan> = max-heap; <tspan font-family="Consolas, monospace">greater&lt;&gt;</tspan> = <tspan font-weight="bold">min-heap</tspan></tspan>
  </text>

  <!-- Concrete min-heap declaration -->
  <rect x="30" y="446" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="9">
    <tspan x="40" y="466" fill="#ddd">std::</tspan><tspan fill="#4ec9b0">priority_queue</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd">, std::</tspan><tspan fill="#4ec9b0">vector</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd">&gt;, std::</tspan><tspan fill="#4ec9b0">greater</tspan><tspan fill="#ddd">&lt;</tspan><tspan fill="#4ec9b0">Pair</tspan><tspan fill="#ddd">&gt;&gt; </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">;</tspan>
  </text>

  <line x1="410" y1="461" x2="458" y2="461" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,457 466,461 458,465" fill="#bdc3c7"/>

  <!-- Description (right side) spans the whole row 6 -->
  <text x="476" y="372" font-size="11" fill="#27ae60" font-weight="bold">Build a min-heap of (distance, vertex) pairs.</text>
  <text x="476" y="390" font-size="11" fill="#555">The yellow box (left) shows what <tspan font-family="Consolas, monospace" font-size="10">std::priority_queue</tspan></text>
  <text x="476" y="406" font-size="11" fill="#555">asks for. Our concrete call fills in:</text>
  <text x="476" y="422" font-size="11" fill="#555">&#x2022; <tspan fill="#c0392b" font-weight="bold">T</tspan> = <tspan font-family="Consolas, monospace" font-size="10">Pair</tspan></text>
  <text x="476" y="438" font-size="11" fill="#555">&#x2022; <tspan fill="#c0392b" font-weight="bold">Container</tspan> = <tspan font-family="Consolas, monospace" font-size="10">std::vector&lt;Pair&gt;</tspan></text>
  <text x="476" y="454" font-size="11" fill="#555">&#x2022; <tspan fill="#c0392b" font-weight="bold">Compare</tspan> = <tspan font-family="Consolas, monospace" font-size="10">std::greater&lt;Pair&gt;</tspan> (flips it to min-heap!)</text>
  <text x="476" y="470" font-size="10" fill="#888" font-style="italic">The comparator is the key &#x2014; without it we'd get a max-heap.</text>

  <!-- ===== ROW 7: Seed min-heap ===== -->
  <rect x="30" y="488" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="508" fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">source</tspan><tspan fill="#ddd">});</tspan>
  </text>
  <line x1="410" y1="503" x2="458" y2="503" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,499 466,503 458,507" fill="#bdc3c7"/>
  <text x="476" y="500" font-size="11" fill="#555"><tspan font-weight="bold">Seed the min-heap.</tspan> Push the source at distance 0.</text>
  <text x="476" y="516" font-size="11" fill="#555">First &#x2014; and only &#x2014; thing in the heap before the main loop.</text>

  <!-- ===== MAIN LOOP SECTION LABEL ===== -->
  <text x="30" y="546" font-size="10" fill="#8e44ad" font-weight="bold" font-style="italic">Main loop: extract closest, skip stale, relax neighbors</text>

  <!-- Main-loop row backgrounds -->
  <rect x="20" y="552" width="820" height="58" fill="#f9f9f9"/>
  <rect x="20" y="610" width="820" height="48" fill="white"/>
  <rect x="20" y="658" width="820" height="110" fill="#f9f9f9"/>

  <!-- ===== ROW 8: while + pop ===== -->
  <rect x="30" y="560" width="380" height="40" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="576" fill="#c586c0">while</tspan><tspan fill="#ddd"> (!</tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">empty</tspan><tspan fill="#ddd">()) {</tspan>
    <tspan x="60" y="592" fill="#ddd">auto [</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">top</tspan><tspan fill="#ddd">(); </tspan><tspan fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">pop</tspan><tspan fill="#ddd">();</tspan>
  </text>
  <line x1="410" y1="580" x2="458" y2="580" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,576 466,580 458,584" fill="#bdc3c7"/>
  <text x="476" y="570" font-size="11" fill="#27ae60" font-weight="bold">Pop the smallest-distance pair.</text>
  <text x="476" y="586" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">u</tspan> is the next vertex to finalize;</text>
  <text x="476" y="602" font-size="11" fill="#555"><tspan font-family="Consolas, monospace" font-size="10">d</tspan> is the distance recorded at push time.</text>

  <!-- ===== ROW 9: Stale skip ===== -->
  <rect x="30" y="618" width="380" height="30" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="638" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">d</tspan><tspan fill="#ddd"> &gt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">]) </tspan><tspan fill="#c586c0">continue</tspan><tspan fill="#ddd">;</tspan>
  </text>
  <line x1="410" y1="633" x2="458" y2="633" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,629 466,633 458,637" fill="#bdc3c7"/>
  <text x="476" y="630" font-size="11" fill="#c0392b" font-weight="bold">Stale-entry skip.</text>
  <text x="476" y="646" font-size="11" fill="#555">If <tspan font-family="Consolas, monospace" font-size="10">d</tspan> is worse than what we already know, this pair is out of date (see 2a).</text>

  <!-- ===== ROW 10: Relaxation loop ===== -->
  <rect x="30" y="666" width="380" height="92" rx="4" fill="#2d2d2d"/>
  <text font-family="Consolas, 'Courier New', monospace" font-size="10">
    <tspan x="40" y="682" fill="#c586c0">for</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">auto</tspan><tspan fill="#ddd">&amp; </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd"> : </tspan><tspan fill="#9cdcfe">adj_list_</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">at</tspan><tspan fill="#ddd">(</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">)) {</tspan>
    <tspan x="60" y="698" fill="#569cd6">const</tspan><tspan fill="#ddd"> </tspan><tspan fill="#569cd6">int</tspan><tspan fill="#ddd"> </tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd"> = </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">u</tspan><tspan fill="#ddd">] + </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">weight</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="60" y="714" fill="#c586c0">if</tspan><tspan fill="#ddd"> (</tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd"> &lt; </tspan><tspan fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">]) {</tspan>
    <tspan x="80" y="730" fill="#9cdcfe">dist</tspan><tspan fill="#ddd">[</tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">] = </tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd">;</tspan>
    <tspan x="80" y="746" fill="#9cdcfe">min_heap</tspan><tspan fill="#ddd">.</tspan><tspan fill="#dcdcaa">push</tspan><tspan fill="#ddd">({</tspan><tspan fill="#9cdcfe">new_dist</tspan><tspan fill="#ddd">, </tspan><tspan fill="#9cdcfe">edge</tspan><tspan fill="#ddd">.</tspan><tspan fill="#9cdcfe">to</tspan><tspan fill="#ddd">});</tspan>
  </text>
  <line x1="410" y1="712" x2="458" y2="712" stroke="#bdc3c7" stroke-width="1.5"/>
  <polygon points="458,708 466,712 458,716" fill="#bdc3c7"/>
  <text x="476" y="682" font-size="11" fill="#27ae60" font-weight="bold">Relaxation.</text>
  <text x="476" y="698" font-size="11" fill="#555">For every outgoing edge from <tspan font-family="Consolas, monospace" font-size="10">u</tspan>:</text>
  <text x="476" y="714" font-size="11" fill="#555">&#x2022; compute the candidate path length</text>
  <text x="476" y="730" font-size="11" fill="#555">&#x2022; if shorter than what we had, <tspan font-weight="bold">update</tspan></text>
  <text x="476" y="746" font-size="11" fill="#555">&#x2022; push the new pair so it's considered later</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="778" width="800" height="142" rx="8" fill="#f0faf0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="430" y="800" text-anchor="middle" fill="#27ae60" font-size="13" font-weight="bold">Why Dijkstra's Is Correct</text>
  <text x="430" y="820" text-anchor="middle" fill="#555" font-size="12">The min-heap always hands us the unfinalized vertex with the smallest known distance.</text>
  <text x="430" y="838" text-anchor="middle" fill="#555" font-size="12">With non-negative weights, no later path can ever be cheaper &#x2014; so we can "finalize" it on pop.</text>

  <text x="430" y="864" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">Key invariant</text>
  <text x="430" y="882" text-anchor="middle" fill="#555" font-size="11">When a vertex is popped with <tspan font-family="Consolas, monospace">d == dist[u]</tspan>, that distance is final.</text>
  <text x="430" y="898" text-anchor="middle" fill="#555" font-size="11">Stale entries (where <tspan font-family="Consolas, monospace">d &gt; dist[u]</tspan>) are leftovers from earlier, worse paths we've since beaten.</text>
  <text x="430" y="916" text-anchor="middle" fill="#888" font-size="10">Complexity: O((V + E) log V) &#x2014; every edge can cause at most one heap push.</text>
</svg>
